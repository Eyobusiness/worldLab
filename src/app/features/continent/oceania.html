<div class="space-y-8">
  <div class="bg-purple-600/20 border border-white/10 rounded-3xl p-8 flex flex-col items-center text-center">
    <h1 class="text-white text-5xl font-black">Océanie</h1>
    <p class="text-white/40 mt-4">{{ stats().count }} archipels et nations</p>
  </div>

  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
    @for (p of pagedPaysOceania(); track p.cca3) {
      <div class="bg-white/5 border border-white/10 rounded-2xl p-4 hover:border-purple-500/30 transition-all">
        <h3 class="text-white font-bold mb-4">{{ p.name.common }}</h3>
        <div class="flex justify-between items-center">
          <span class="text-xs text-white/70">{{ ws.formatPopulation(p.population) }} hab.</span>
          <span class="text-xs text-purple-400 font-bold">{{ ws.formatPopulation(p.area ?? 0) }} km²</span>
        </div>
      </div>
    }
  </div>
</div>
