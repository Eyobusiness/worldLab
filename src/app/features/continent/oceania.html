<div class="space-y-8">
  <div class="bg-purple-600/20 border border-white/10 rounded-3xl p-8 flex flex-col items-center text-center">
    <h1 class="text-white text-5xl font-black">Océanie</h1>
    <div class="mt-6 flex gap-4">
      <div class="bg-white/5 px-6 py-2 rounded-xl border border-white/5 text-white">{{ stats().count }} pays</div>
      <div class="bg-white/5 px-6 py-2 rounded-xl border border-indigo-500/20 text-white">{{ ws.formatPopulation(stats().population) }} hab.</div>
    </div>
  </div>

 <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
    @for (p of pagedPaysOceania(); track p.cca3) {
      <div class="bg-white/5 border border-white/10 rounded-2xl p-4 hover:bg-white/10 transition-all">
        <div class="flex items-center gap-4">
          <img [src]="p.flags.svg" class="w-12 h-8 object-cover rounded shadow-md" alt="drapeau">
          <div class="min-w-0">
            <h3 class="text-white font-bold truncate">{{ p.name.common }}</h3>
          </div>
        </div>
        <div class="mt-4 pt-4 border-t border-white/5 flex justify-between items-center">
          <span class="text-xs text-white/70">{{ ws.formatPopulation(p.population) }} hab.</span>
          <span class="text-xs text-indigo-400 font-mono font-bold">{{ ws.formatPopulation(p.area ?? 0) }} km²</span>
        </div>
      </div>
    }
  </div>
</div>
