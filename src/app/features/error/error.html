<div class="min-h-screen bg-[#0d1b2a] flex items-center justify-center px-4 relative overflow-hidden">

  <div class="absolute top-1/4 -left-20 w-80 h-80 bg-[#f0a500]/10 rounded-full blur-[120px]"></div>
  <div class="absolute bottom-1/4 -right-20 w-80 h-80 bg-blue-500/10 rounded-full blur-[120px]"></div>

  <div class="max-w-md w-full text-center z-10">

    <div class="relative inline-block mb-8">
      <div class="w-32 h-32 rounded-3xl bg-linear-to-br from-[#f0a500] to-[#e07b00]
                  flex items-center justify-center shadow-[0_0_50px_rgba(240,165,0,0.3)]
                  animate-bounce">
        <svg class="w-16 h-16 text-[#0d1b2a]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 4h.01" />
        </svg>
      </div>
      <span class="absolute -top-2 -right-2 bg-red-500 text-white text-xs font-bold px-2 py-1 rounded-lg">
        {{ code() }}
      </span>
    </div>

    <h1 class="text-white text-4xl font-black mb-4 tracking-tight">
      Perdu dans l'espace ?
    </h1>
    <p class="text-white/60 text-lg mb-10 leading-relaxed">
      {{ message() }}
    </p>

    <div class="flex flex-col sm:flex-row gap-4 justify-center">
      <a routerLink="/dashboard"
         class="px-8 py-3 bg-[#f0a500] hover:bg-[#e07b00] text-[#0d1b2a] font-bold rounded-xl
                transition-all duration-200 active:scale-95 shadow-lg shadow-[#f0a500]/20">
        Retour au Tableau de bord
      </a>

      <button (click)="goBack()"
         class="px-8 py-3 bg-white/5 hover:bg-white/10 text-white border border-white/10 font-bold rounded-xl
                transition-all duration-200 backdrop-blur-md">
        Page précédente
      </button>
    </div>

    <div class="mt-16 pt-8 border-t border-white/5">
      <p class="text-white/20 text-sm uppercase tracking-[0.3em]">WorldLab Explorer</p>
    </div>
  </div>
</div>
